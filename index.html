<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
.container { width: 100%; max-width: 800px; }
.header { text-align: center; color: white; margin-bottom: 30px; }
.header h1 { font-size: 2.5em; margin-bottom: 10px; }
.search-box { display: flex; gap: 10px; margin-bottom: 20px; }
.search-box input { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 16px; }
.search-box button { padding: 12px 20px; background: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: #667eea; }
.card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
.city-name { font-size: 2em; color: #333; margin-bottom: 20px; }
.temp { font-size: 3.5em; color: #667eea; font-weight: bold; }
.desc { font-size: 1.2em; color: #666; margin-top: 10px; text-transform: capitalize; }
.details { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
.detail { padding: 15px; background: #f5f5f5; border-radius: 10px; text-align: center; }
.detail strong { display: block; color: #999; font-size: 0.9em; margin-bottom: 5px; }
.detail span { font-size: 1.4em; color: #333; font-weight: bold; }
.error { background: #ff6b6b; color: white; padding: 15px; border-radius: 10px; }
.loading { text-align: center; color: white; font-size: 1.2em; }
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>Weather App</h1><p>Search weather in any city</p></div>
<div class="search-box">
<input type="text" id="city" placeholder="Enter city name...">
<button onclick="search()">Search</button>
</div>
<div id="result"></div>
</div>
<script>
function search() {
var city = document.getElementById("city").value.trim();
if (city) fetchWeather(city);
}
document.getElementById("city").addEventListener("keypress", function(e) {
if (e.key === "Enter") search();
});
function fetchWeather(city) {
document.getElementById("result").innerHTML = '<div class="loading">Loading...</div>';
fetch("https://wttr.in/" + encodeURIComponent(city) + "?format=j1")
.then(function(r) { return r.json(); })
.then(function(data) {
if (data.current_condition && data.current_condition.length > 0) {
var c = data.current_condition[0];
var area = data.nearest_area ? data.nearest_area[0] : null;
var name = area ? area.areaName[0].value : city;
var country = area ? area.country[0].value : "";
var h = '<div class="card">';
h += '<div class="city-name">' + name + (country ? ", " + country : "") + '</div>';
h += '<div class="temp">' + c.temp_C + '\u00B0C</div>';
h += '<div class="desc">' + c.weatherDesc[0].value + '</div>';
h += '<div class="details">';
h += '<div class="detail"><strong>Feels Like</strong><span>' + c.FeelsLikeC + '\u00B0C</span></div>';
h += '<div class="detail"><strong>Humidity</strong><span>' + c.humidity + '%</span></div>';
h += '<div class="detail"><strong>Pressure</strong><span>' + c.pressure + ' hPa</span></div>';
h += '<div class="detail"><strong>Wind</strong><span>' + c.windspeedKmph + ' km/h</span></div>';
h += '</div></div>';
document.getElementById("result").innerHTML = h;
document.getElementById("city").value = "";
} else { showError("City not found"); }
}).catch(function() { showError("Error loading weather"); });
}
function showError(msg) {
document.getElementById("result").innerHTML = '<div class="error">' + msg + '</div>';
}
fetchWeather("Bangkok");
</script>
</body>
</html>
